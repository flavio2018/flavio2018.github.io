---
layout: default
---
<div class="post-content">
    <div style="display: table-row; width: 100%;">
        <div id="post-header-title-column">
	  <h3>{{ page.title }}</h3>
	</div>
	<div id="post-header-date-column">
	  {{ page.date | date_to_string }}
	</div>
    </div>
    <div class="post-separator"></div>
    <div>
        {{ content }}
    </div>
</div>
